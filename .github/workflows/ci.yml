name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install --frozen-lockfile
      - run: cp .env.example .env || true
      - run: bun run --cwd packages/database db:generate
      - run: bun run test 2>&1

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install --frozen-lockfile

      - name: Debug package resolution
        run: |
          echo "=== @opentui packages ==="
          bun pm ls 2>&1 | grep opentui || true
          ls -la node_modules/@opentui/ 2>&1 || echo "no node_modules/@opentui"
          echo "=== .bun cache ==="
          ls -la node_modules/.bun/ 2>&1 | grep opentui || true

      - name: Typecheck
        run: bunx tsc -p tsconfig.json --noEmit 2>&1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
