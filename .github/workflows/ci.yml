name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: cp .env.example .env

      - name: Setup database
        run: |
          cd packages/database
          bunx prisma generate
          DATABASE_URL="file:./prisma/prismcode.db" bunx prisma db push

      - run: bun run test
        env:
          DATABASE_URL: file:./packages/database/prisma/prismcode.db

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx tsc --noEmit
