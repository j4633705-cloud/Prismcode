name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install --frozen-lockfile
      - run: cp .env.example .env || true
      - run: bun run --cwd packages/database db:generate
      - name: Test per package
        run: |
          ALL_PASSED=0
          for PKG in shared database cli server mcp-server; do
            echo "=== Test: $PKG ==="
            bun run --cwd "packages/$PKG" test 2>&1 && echo "OK" || { echo "FAILED"; ALL_PASSED=1; }
          done
          exit $ALL_PASSED

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install --frozen-lockfile

      - name: Debug package resolution
        run: |
          echo "=== @opentui packages ==="
          bun pm ls 2>&1 | grep opentui || true
          ls -la node_modules/@opentui/ 2>&1 || echo "no node_modules/@opentui"
          echo "=== .bun cache ==="
          ls -la node_modules/.bun/ 2>&1 | grep opentui || true

      - name: Typecheck per package
        run: |
          ALL_PASSED=0
          for PKG in shared database cli server mcp-server; do
            echo "=== Typecheck: $PKG ==="
            TSCONFIG="packages/$PKG/tsconfig.json"
            if [ ! -f "$TSCONFIG" ]; then
              echo "SKIP (no tsconfig)"
              continue
            fi
            bunx tsc -p "$TSCONFIG" --noEmit > /tmp/tsc_${PKG}.txt 2>&1
            RC=$?
            if [ $RC -ne 0 ]; then
              echo "FAILED ($RC)"
              cat /tmp/tsc_${PKG}.txt
              ALL_PASSED=$RC
            else
              echo "OK"
            fi
          done
          exit $ALL_PASSED

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
