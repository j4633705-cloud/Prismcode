name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

env:
  ARTIFACT_DIR: ${{ github.workspace }}/ci-artifacts

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install --frozen-lockfile
      - run: cp .env.example .env || true
      - run: bun run --cwd packages/database db:generate
      - name: Test per package
        run: |
          mkdir -p $ARTIFACT_DIR
          ALL_PASSED=0
          for PKG in shared database cli server mcp-server; do
            echo "=== Test: $PKG ==="
            if [ ! -d "packages/$PKG" ]; then
              echo "SKIP (no dir)"
              continue
            fi
            if grep -q '"test"' "packages/$PKG/package.json" 2>/dev/null; then
              OUTPUT=$(bun run --cwd "packages/$PKG" test 2>&1)
              RC=$?
              echo "=== Test $PKG (exit=$RC) ===" >> "$ARTIFACT_DIR/test-output.txt"
              echo "$OUTPUT" >> "$ARTIFACT_DIR/test-output.txt"
              if [ $RC -ne 0 ]; then
                echo "FAILED"
                echo "$OUTPUT"
                ALL_PASSED=1
              else
                echo "OK"
              fi
            else
              echo "SKIP (no test script)"
            fi
          done
          exit $ALL_PASSED

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: /tmp/ci-artifacts/*.txt

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install --frozen-lockfile

      - name: Debug package resolution
        run: |
          mkdir -p $ARTIFACT_DIR
          echo "=== Bun version: $(bun --version) ===" | tee -a $ARTIFACT_DIR/debug.txt
          echo "=== @opentui packages ===" | tee -a $ARTIFACT_DIR/debug.txt
          { bun pm ls 2>&1 | grep opentui || echo "(none)"; } | tee -a $ARTIFACT_DIR/debug.txt
          { ls -la node_modules/@opentui 2>&1 || echo "no @opentui dir"; } | tee -a $ARTIFACT_DIR/debug.txt
          { ls -la node_modules/.bun/ 2>&1 | grep opentui || echo "(none in .bun)"; } | tee -a $ARTIFACT_DIR/debug.txt

      - name: Typecheck per package
        run: |
          ALL_PASSED=0
          for PKG in shared database cli server mcp-server; do
            echo "=== Typecheck: $PKG ==="
            TSCONFIG="packages/$PKG/tsconfig.json"
            if [ ! -f "$TSCONFIG" ]; then
              echo "SKIP (no tsconfig)"
              continue
            fi
            OUTPUT=$(bunx tsc -p "$TSCONFIG" --noEmit --pretty false 2>&1)
            RC=$?
            echo "=== Typecheck $PKG (exit=$RC) ===" >> "$ARTIFACT_DIR/typecheck-output.txt"
            echo "$OUTPUT" >> "$ARTIFACT_DIR/typecheck-output.txt"
            echo "=== tsc version ===" >> "$ARTIFACT_DIR/typecheck-output.txt"
            bunx tsc --version >> "$ARTIFACT_DIR/typecheck-output.txt" 2>&1
            if [ $RC -ne 0 ]; then
              echo "FAILED ($RC)"
              echo "$OUTPUT"
              ALL_PASSED=$RC
            else
              echo "OK"
            fi
          done
          exit $ALL_PASSED

      - name: Upload typecheck artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-output
          path: /tmp/ci-artifacts/*.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
