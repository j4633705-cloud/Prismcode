name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install --frozen-lockfile
      - run: cp .env.example .env || true
      - run: bun run --cwd packages/database db:generate
      - name: Test per package
        run: |
          ALL_PASSED=0
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for PKG in shared database cli server mcp-server; do
            echo "=== Test: $PKG ==="
            if [ ! -d "packages/$PKG" ]; then
              echo "SKIP (no dir)"
              continue
            fi
            if grep -q '"test"' "packages/$PKG/package.json" 2>/dev/null; then
              OUTPUT=$(bun run --cwd "packages/$PKG" test 2>&1)
              RC=$?
              if [ $RC -ne 0 ]; then
                echo "FAILED"
                echo "$OUTPUT"
                echo "- **$PKG**: FAILED" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
                echo "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
                ALL_PASSED=1
              else
                echo "OK"
                echo "- $PKG: OK" >> "$GITHUB_STEP_SUMMARY"
              fi
            else
              echo "SKIP (no test script)"
              echo "- $PKG: no test script" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          exit $ALL_PASSED

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install --frozen-lockfile

      - name: Debug package resolution
        run: |
          echo "## Environment" >> "$GITHUB_STEP_SUMMARY"
          echo "- bun: $(bun --version)" >> "$GITHUB_STEP_SUMMARY"
          echo "- node: $(node --version 2>&1 || echo 'N/A')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### @opentui packages" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "=== @opentui packages ==="
          bun pm ls 2>&1 | grep opentui || true
          ls -la node_modules/@opentui 2>&1 || echo "no @opentui dir at node_modules"
          ls -la node_modules/.bun/ 2>&1 | grep opentui || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Typecheck per package
        run: |
          ALL_PASSED=0
          echo "## Typecheck Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for PKG in shared database cli server mcp-server; do
            echo "=== Typecheck: $PKG ==="
            TSCONFIG="packages/$PKG/tsconfig.json"
            if [ ! -f "$TSCONFIG" ]; then
              echo "SKIP (no tsconfig)"
              echo "- **$PKG**: no tsconfig" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            OUTPUT=$(bunx tsc -p "$TSCONFIG" --noEmit 2>&1)
            RC=$?
            if [ $RC -ne 0 ]; then
              echo "FAILED ($RC)"
              echo "$OUTPUT"
              echo "- **$PKG**: FAILED" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              ALL_PASSED=$RC
            else
              echo "OK"
              echo "- $PKG: OK" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          exit $ALL_PASSED

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
