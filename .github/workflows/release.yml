name: Release Binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Build binary
        run: |
          case "${{ runner.os }}" in
            Windows) TARGET="bun-windows-x64-modern" ;;
            macOS)   TARGET="bun-darwin-x64-modern" ;;
            Linux)   TARGET="bun-linux-x64-modern" ;;
          esac
          bun build --compile --target="$TARGET" --outfile="dist/prismcode-${{ runner.os }}" ./packages/cli/src/index.tsx
        shell: bash

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: prismcode-${{ runner.os }}
          path: dist/prismcode-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: prismcode-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: prismcode-*
          generate_release_notes: true
