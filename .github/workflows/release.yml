name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Prismcode v1.0.0

            ### Install via npm
            ```bash
            npm install -g @prismcode543/cli
            ```

            ### Quick start
            ```bash
            prismcode
            ```

            See the [README](https://github.com/j4633705-cloud/Prismcode) for full documentation.
