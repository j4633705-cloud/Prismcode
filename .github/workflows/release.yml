name: Release Binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Build binary
        run: bun run build:binary
        shell: bash

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: prismcode-${{ runner.os }}
          path: dist/prismcode*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: prismcode-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: prismcode-*
          generate_release_notes: true
