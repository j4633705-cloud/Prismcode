name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: bun-windows-x64-modern
            ext: .exe
            asset: prismcode-win-x64.exe
          - os: ubuntu-latest
            target: bun-linux-x64-modern
            ext: ""
            asset: prismcode-linux-x64
          - os: macos-latest
            target: bun-darwin-x64
            ext: ""
            asset: prismcode-darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun build --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.asset }} ./packages/cli/src/index.tsx

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
